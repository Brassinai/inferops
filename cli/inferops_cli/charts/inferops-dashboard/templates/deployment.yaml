apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      {{- include "inferops-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferops-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "inferops-dashboard.serviceAccountName" . }}
      automountServiceAccountToken: true
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INFEROPS_DASHBOARD_REQUEST_TIMEOUT
              value: {{ .Values.dashboard.requestTimeout | quote }}
            - name: INFEROPS_DASHBOARD_MAX_EVENTS
              value: {{ .Values.dashboard.maxEvents | quote }}
            {{- with .Values.dashboard.prometheusURL }}
            - name: INFEROPS_DASHBOARD_PROMETHEUS_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.dashboard.gatewayBaseURL }}
            - name: INFEROPS_DASHBOARD_GATEWAY_BASE_URL
              value: {{ . | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
