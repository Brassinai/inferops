{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - inference.inferops.dev
    resources:
      - modeldeployments
      - modelcaches
      - modelruntimes
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - events
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "inferops-dashboard.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "inferops-dashboard.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}-nodes
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}-nodes
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "inferops-dashboard.fullname" . }}-nodes
subjects:
  - kind: ServiceAccount
    name: {{ include "inferops-dashboard.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
