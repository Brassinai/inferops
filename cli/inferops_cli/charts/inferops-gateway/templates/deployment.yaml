apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferops-gateway.fullname" . }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "inferops-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferops-gateway.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "inferops-gateway.serviceAccountName" . }}
      automountServiceAccountToken: true
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INFEROPS_GATEWAY_REGISTRY
              value: kubernetes
            - name: INFEROPS_GATEWAY_SYNC_INTERVAL
              value: {{ .Values.discovery.syncInterval | quote }}
            - name: INFEROPS_GATEWAY_RATE_LIMIT_RPM
              value: {{ .Values.trafficPolicy.defaultRateLimit.requestsPerMinute | quote }}
            - name: INFEROPS_GATEWAY_RATE_LIMIT_BURST
              value: {{ .Values.trafficPolicy.defaultRateLimit.burst | quote }}
            - name: INFEROPS_GATEWAY_REQUEST_LOGGING
              value: {{ .Values.trafficPolicy.requestLogging.enabled | quote }}
            {{- if .Values.auth.enabled }}
            - name: INFEROPS_GATEWAY_AUTH_TOKEN_FILE
              value: {{ printf "%s/%s" .Values.auth.mountPath .Values.auth.secretKey | quote }}
            {{- end }}
          {{- if .Values.auth.enabled }}
          volumeMounts:
            - name: gateway-auth
              mountPath: {{ .Values.auth.mountPath | quote }}
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.auth.enabled }}
      volumes:
        - name: gateway-auth
          secret:
            secretName: {{ required "auth.secretName is required when auth.enabled is true" .Values.auth.secretName | quote }}
            defaultMode: 0444
            items:
              - key: {{ required "auth.secretKey is required when auth.enabled is true" .Values.auth.secretKey | quote }}
                path: {{ .Values.auth.secretKey | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.topologySpread.enabled .Values.topologySpreadConstraints }}
      {{- fail "topologySpread.enabled and topologySpreadConstraints cannot both be configured" }}
      {{- end }}
      {{- if .Values.topologySpread.enabled }}
      {{- if lt (int .Values.topologySpread.maxSkew) 1 }}
      {{- fail "topologySpread.maxSkew must be greater than zero" }}
      {{- end }}
      {{- if not .Values.topologySpread.topologyKey }}
      {{- fail "topologySpread.topologyKey is required when topology spread is enabled" }}
      {{- end }}
      {{- if not (has .Values.topologySpread.whenUnsatisfiable (list "DoNotSchedule" "ScheduleAnyway")) }}
      {{- fail "topologySpread.whenUnsatisfiable must be DoNotSchedule or ScheduleAnyway" }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.topologySpread.maxSkew }}
          topologyKey: {{ .Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "inferops-gateway.selectorLabels" . | nindent 14 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
