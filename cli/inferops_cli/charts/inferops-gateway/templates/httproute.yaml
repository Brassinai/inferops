{{- if .Values.gatewayAPI.enabled }}
{{- if not .Values.gatewayAPI.parentRefs }}
{{- fail "gatewayAPI.parentRefs must contain at least one Gateway reference when gatewayAPI.enabled is true" }}
{{- end }}
{{- range .Values.gatewayAPI.parentRefs }}
{{- $name := required "every gatewayAPI.parentRefs entry requires name" .name -}}
{{- end }}
{{- if ne .Values.gatewayAPI.path "/" }}
{{- fail "gatewayAPI.path must be / because the InferOps gateway owns model route prefixes" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "inferops-gateway.fullname" . }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
  {{- with .Values.gatewayAPI.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.gatewayAPI.parentRefs | nindent 4 }}
  {{- with .Values.gatewayAPI.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "inferops-gateway.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
