{{- if .Values.tailscale.enabled }}
{{- $hostname := required "tailscale.hostname is required when Tailscale exposure is enabled" .Values.tailscale.hostname }}
{{- if or (gt (len $hostname) 63) (not (regexMatch "^[a-z]([a-z0-9-]*[a-z])?$" $hostname)) }}
{{- fail "tailscale.hostname must be at most 63 characters, start and end with a lowercase letter, and contain only lowercase letters, digits, and hyphens" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "inferops-gateway.fullname" . }}-tailscale
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
  {{- with .Values.tailscale.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - {{ $hostname | quote }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "inferops-gateway.fullname" . }}
                port:
                  name: http
{{- end }}
