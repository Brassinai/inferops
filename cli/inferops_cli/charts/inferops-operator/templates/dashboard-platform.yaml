{{- if .Values.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inferops-operator.fullname" . }}-platform-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-operator.labels" . | nindent 4 }}
    {{- with .Values.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboards.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  inferops-platform-dashboard.json: |-
    {
      "uid": "inferops-platform",
      "title": "InferOps / Platform",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["inferops", "platform"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "cache_phase",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(inferops_modelcache_phase_count, phase)",
            "allValue": ".*",
            "current": {"selected": true, "text": "All", "value": "$__all"},
            "includeAll": true,
            "multi": true,
            "refresh": 1
          },
          {
            "name": "gpu_resource",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": "label_values(inferops_gpu_slots_available, resource)",
            "allValue": ".*",
            "current": {"selected": true, "text": "All", "value": "$__all"},
            "includeAll": true,
            "multi": true,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Ready caches",
          "description": "ModelCache objects currently available for activation.",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(inferops_modelcache_phase_count{phase=\"Ready\"})",
              "legendFormat": "ready"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Activation queue",
          "description": "ModelDeployments waiting for GPU capacity.",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(inferops_activation_queue_depth)",
              "legendFormat": "queued"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Gateway active requests",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(inferops_gateway_active_requests)",
              "legendFormat": "active"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 4,
          "type": "stat",
          "title": "GPU slots available",
          "description": "Scheduler-visible GPU capacity tracked by InferOps.",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "refId": "A",
              "expr": "sum(inferops_gpu_slots_available{resource=~\"$gpu_resource\"})",
              "legendFormat": "available"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Cache availability by phase",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (phase) (inferops_modelcache_phase_count{phase=~\"$cache_phase\"})",
              "legendFormat": "{{`{{phase}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Cache reserved storage",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (phase) (inferops_modelcache_reserved_bytes{phase=~\"$cache_phase\"})",
              "legendFormat": "{{`{{phase}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Cache download p95",
          "description": "Downloader Job duration from creation to verified cache completion.",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 12},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(inferops_cache_download_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Activation duration p95",
          "description": "Time from runtime Deployment creation until readiness.",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 12},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(inferops_model_activation_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Controller failures",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 12},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (controller, reason) (rate(inferops_controller_failures_total[$__rate_interval]))",
              "legendFormat": "{{`{{controller}}`}} / {{`{{reason}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "ops"}}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Gateway request rate",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 20},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (method, status_code) (rate(inferops_gateway_requests_total[$__rate_interval]))",
              "legendFormat": "{{`{{method}}`}} {{`{{status_code}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Gateway latency p95",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 20},
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum by (le, method) (rate(inferops_gateway_request_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "{{`{{method}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Gateway upstream errors",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 20},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (reason) (rate(inferops_gateway_upstream_errors_total[$__rate_interval]))",
              "legendFormat": "{{`{{reason}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "ops"}}
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "GPU slot accounting",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (resource) (inferops_gpu_slots_total{resource=~\"$gpu_resource\"})",
              "legendFormat": "total {{`{{resource}}`}}"
            },
            {
              "refId": "B",
              "expr": "sum by (resource) (inferops_gpu_slots_occupied{resource=~\"$gpu_resource\"})",
              "legendFormat": "occupied {{`{{resource}}`}}"
            },
            {
              "refId": "C",
              "expr": "sum by (resource) (inferops_gpu_slots_available{resource=~\"$gpu_resource\"})",
              "legendFormat": "available {{`{{resource}}`}}"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "short"}}
        },
        {
          "id": 14,
          "type": "text",
          "title": "Runtime dashboard standard",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "options": {
            "mode": "markdown",
            "content": "Use this platform dashboard for InferOps-owned signals that apply to every runtime. Add a runtime dashboard only for engine-native metrics, keep labels bounded, and document panels whose metrics are not exported by a runtime."
          }
        }
      ]
    }
{{- end }}
