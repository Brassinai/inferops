{{- if ne (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must be 1 until the operator implements leader election" }}
{{- end }}
{{- $cacheRoot := required "cache.root is required" .Values.cache.root }}
{{- if or (not (isAbs $cacheRoot)) (eq $cacheRoot "/") (ne (clean $cacheRoot) $cacheRoot) }}
{{- fail "cache.root must be a clean absolute path other than /" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferops-operator.fullname" . }}
  labels:
    {{- include "inferops-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "inferops-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferops-operator.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      serviceAccountName: {{ include "inferops-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: INFEROPS_CACHE_ROOT
              value: {{ .Values.cache.root | quote }}
            - name: INFEROPS_CACHE_DOWNLOADER_IMAGE
              value: {{ .Values.cache.downloaderImage | quote }}
            - name: INFEROPS_HEALTH_ADDR
              value: ":{{ .Values.probes.port }}"
          ports:
            - name: health
              containerPort: {{ .Values.probes.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
