apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelcaches.inference.inferops.dev
spec:
  group: inference.inferops.dev
  names:
    kind: ModelCache
    plural: modelcaches
    singular: modelcache
    shortNames:
      - mcache
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Node
          type: string
          jsonPath: .status.nodeName
        - name: Size
          type: string
          jsonPath: .status.size
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - modelRepo
                - storage
              properties:
                modelRepo:
                  type: string
                  minLength: 1
                revision:
                  type: string
                  default: main
                storage:
                  type: object
                  required:
                    - type
                    - size
                    - path
                  properties:
                    type:
                      type: string
                      enum: [nodeLocal]
                    size:
                      type: string
                      minLength: 1
                    nodeName:
                      type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                            enum: [Equal, Exists]
                          value:
                            type: string
                          effect:
                            type: string
                            enum: [NoSchedule, PreferNoSchedule, NoExecute]
                          tolerationSeconds:
                            type: integer
                            format: int64
                            minimum: 0
                    path:
                      type: string
                      pattern: ^/
                secretRef:
                  type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum: [Pending, Downloading, Ready, Failed]
                revision:
                  type: string
                checksum:
                  type: string
                nodeName:
                  type: string
                nodeUID:
                  type: string
                path:
                  type: string
                size:
                  type: string
                reservedSize:
                  type: string
                inputHash:
                  type: string
                lastUsedTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", Unknown]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
