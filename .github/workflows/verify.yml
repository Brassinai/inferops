name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Required verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install verification dependencies
        run: |
          python -m pip install --requirement requirements-dev.txt
          mkdir -p "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
          GOBIN="${RUNNER_TEMP}/bin" go install github.com/yannh/kubeconform/cmd/kubeconform@v0.6.7

      - name: Build and smoke test fake runtime image
        run: |
          docker build \
            --target fake \
            --file runtimes/nano_vllm/Dockerfile \
            --tag inferops-runtime:test .
          container_id=$(docker run --detach --publish 127.0.0.1:18000:8000 inferops-runtime:test)
          trap 'docker rm --force "${container_id}"' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18000/readiness >/dev/null; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              docker logs "${container_id}"
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent --no-buffer \
            --header 'content-type: application/json' \
            --data '{"prompt":"ci","max_tokens":2,"stream":true}' \
            http://127.0.0.1:18000/v1/completions | grep --fixed-strings 'data: [DONE]'

      - name: Run required verification
        run: make verify
