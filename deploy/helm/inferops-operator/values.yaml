image:
  repository: ghcr.io/inferops/inferops-operator
  tag: "0.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

podDisruptionBudget:
  enabled: true
  minAvailable: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

profile: default

gpu:
  required: false

diagnostics:
  cacheProbeImage: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

networkPolicy:
  enabled: true
  # Empty keeps the named metrics, health, and webhook ports reachable from
  # any source. Supply peers to restrict them to monitoring/control-plane pods.
  ingressFrom: []
  # Replace these common Kubernetes API Service IPs with the exact /32 or
  # /128 advertised as KUBERNETES_SERVICE_HOST in this cluster.
  apiServerCIDRs:
    - 10.96.0.1/32
    - 10.43.0.1/32
    - 10.0.0.1/32
  dns:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
    podSelector:
      matchLabels:
        k8s-app: kube-dns

cache:
  root: /var/lib/inferops/models
  defaultSize: 100Gi
  downloaderImage: ghcr.io/inferops/model-downloader:0.0.0
  nodeSelector: {}
  capacityAnnotation: inferops.dev/cache-capacity
  requiredNodeResources: []
  pendingRequeueInterval: 30s
  downloadRequeueInterval: 10s

scheduling:
  gpuNodeSelector: {}
  gpuTypeLabel: inferops.dev/gpu-type

webhook:
  enabled: true
  port: 9443
  certDir: /tmp/k8s-webhook-server/serving-certs
  tls:
    existingSecret: ""
    caBundle: ""

metrics:
  port: 8080

modelRuntimes:
  nano-vllm:
    enabled: true
    engine: nano-vllm
    protocol: openai
    image:
      repository: ghcr.io/inferops/nano-vllm
      tag: "0.0.0"
    port: 8000
    healthPath: /health
    readinessPath: /health
    metricsPath: /metrics
  vllm:
    enabled: true
    engine: vllm
    protocol: openai
    image:
      repository: ghcr.io/inferops/vllm
      tag: "0.0.0"
    port: 8000
    healthPath: /health
    readinessPath: /health
    metricsPath: /metrics
  sglang:
    enabled: true
    engine: sglang
    protocol: openai
    image:
      repository: ghcr.io/inferops/sglang
      tag: "0.0.0"
    port: 8000
    healthPath: /health
    readinessPath: /health_generate
    metricsPath: /metrics
  llama-cpp:
    enabled: true
    engine: llama-cpp
    protocol: openai
    image:
      repository: ghcr.io/inferops/llama-cpp
      tag: "0.0.0"
    port: 8000
    healthPath: /health
    readinessPath: /health
    metricsPath: /metrics

probes:
  port: 8081
  livenessPath: /healthz
  readinessPath: /readyz

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
