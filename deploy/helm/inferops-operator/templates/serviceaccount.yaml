{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "inferops-operator.fullname" .) .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: {{ include "inferops-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
