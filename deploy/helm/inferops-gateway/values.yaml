image:
  repository: ghcr.io/inferops/inferops-gateway
  tag: "0.0.0"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

discovery:
  # Bounds how long a Kubernetes lifecycle or Service change can remain unseen.
  # The gateway rejects values below one second.
  syncInterval: 5s

auth:
  enabled: false
  # Name of an existing Secret in the release namespace.
  secretName: ""
  # The key contains one bearer token per line.
  secretKey: token
  mountPath: /var/run/secrets/inferops-gateway-auth

podDisruptionBudget:
  enabled: true
  minAvailable: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  annotations: {}

tailscale:
  enabled: false
  hostname: inferops
  annotations: {}

probes:
  livenessPath: /healthz
  readinessPath: /readyz

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
