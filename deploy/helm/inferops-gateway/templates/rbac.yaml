{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "inferops-gateway.fullname" . }}-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - inference.inferops.dev
    resources:
      - modeldeployments
    verbs:
      - list
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - list
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "inferops-gateway.fullname" . }}-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "inferops-gateway.fullname" . }}-discovery
subjects:
  - kind: ServiceAccount
    name: {{ include "inferops-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
