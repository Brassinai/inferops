{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "inferops-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "inferops-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {{- with .Values.networkPolicy.gateway.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: model-runtime
      ports:
        - port: http
          protocol: TCP
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.dns.podSelector | nindent 12 }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if not .Values.networkPolicy.gateway.apiServerCIDRs }}
    {{- fail "networkPolicy.gateway.apiServerCIDRs must contain at least one Kubernetes API CIDR" }}
    {{- end }}
    - to:
        {{- range .Values.networkPolicy.gateway.apiServerCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "inferops-gateway.fullname" . }}-runtimes
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: inferops
      app.kubernetes.io/component: model-runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "inferops-gateway.selectorLabels" . | nindent 14 }}
        {{- with .Values.networkPolicy.runtime.additionalIngressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - port: http
          protocol: TCP
  egress:
    {{- toYaml .Values.networkPolicy.runtime.egress | nindent 4 }}
{{- end }}
