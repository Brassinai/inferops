image:
  repository: ghcr.io/inferops/inferops-runtime
  tag: "0.0.0"
  pullPolicy: IfNotPresent

model:
  repo: ""
  path: /models/model

runtime:
  healthPath: /health
  readinessPath: /health
  metricsPath: /metrics
  maxModelLen: 4096
  maxNumSeqs: 256
  tensorParallelSize: 1
  gpuMemoryUtilization: 0.85
  enforceEager: false
  dtype: float16
  terminationGracePeriodSeconds: 330

cache:
  hostPath: /var/lib/inferops/models/model

metrics:
  prometheusAnnotations: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

resources:
  requests:
    cpu: "4"
    memory: 16Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: "4"
    memory: 16Gi
    nvidia.com/gpu: "1"
