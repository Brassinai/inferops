apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.metrics.prometheusAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
      {{- end }}
    spec:
      containers:
        - name: runtime
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: FAKE_MODE
              value: {{ .Values.runtime.fakeMode | quote }}
            - name: MODEL_REPO
              value: {{ .Values.model.repo | quote }}
            - name: MODEL_REVISION
              value: {{ .Values.model.revision | quote }}
            - name: MODEL_PATH
              value: {{ .Values.model.path | quote }}
            - name: MAX_MODEL_LEN
              value: {{ .Values.runtime.maxModelLen | quote }}
            - name: MAX_NUM_SEQS
              value: {{ .Values.runtime.maxNumSeqs | quote }}
            - name: ENFORCE_EAGER
              value: {{ .Values.runtime.enforceEager | quote }}
            - name: MODEL_DTYPE
              value: {{ .Values.runtime.dtype | quote }}
            {{- if .Values.runtime.tensorParallelSize }}
            - name: TENSOR_PARALLEL_SIZE
              value: {{ .Values.runtime.tensorParallelSize | quote }}
            {{- end }}
            {{- if .Values.runtime.gpuMemoryUtilization }}
            - name: GPU_MEMORY_UTILIZATION
              value: {{ .Values.runtime.gpuMemoryUtilization | quote }}
            {{- end }}
            - name: PORT
              value: "8000"
            - name: INFEROPS_DRAIN_TIMEOUT
              value: {{ .Values.runtime.drainTimeout | quote }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          startupProbe:
            httpGet:
              path: /readiness
              port: http
            failureThreshold: 60
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.model.path | quote }}
              readOnly: true
      volumes:
        - name: model-cache
          hostPath:
            path: {{ .Values.cache.hostPath | quote }}
            type: Directory
      terminationGracePeriodSeconds: {{ .Values.runtime.terminationGracePeriodSeconds }}
