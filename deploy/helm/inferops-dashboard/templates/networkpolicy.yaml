{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "inferops-dashboard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "inferops-dashboard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "inferops-dashboard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.dns.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.dns.podSelector | nindent 12 }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- if not .Values.networkPolicy.apiServerCIDRs }}
    {{- fail "networkPolicy.apiServerCIDRs must contain at least one Kubernetes API CIDR" }}
    {{- end }}
    - to:
        {{- range .Values.networkPolicy.apiServerCIDRs }}
        {{- if not . }}
        {{- fail "networkPolicy.apiServerCIDRs must not contain empty CIDRs" }}
        {{- end }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
{{- end }}
