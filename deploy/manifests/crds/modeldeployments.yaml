apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modeldeployments.inference.inferops.dev
spec:
  group: inference.inferops.dev
  names:
    kind: ModelDeployment
    plural: modeldeployments
    singular: modeldeployment
    shortNames:
      - mdeploy
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Desired
          type: string
          jsonPath: .spec.activation.desiredState
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - model
                - runtime
              x-kubernetes-validations:
                - rule: "has(self.resources) && (has(self.resources.gpu) || (has(self.resources.cpu) && has(self.resources.memory)))"
                  message: CPU-only deployments must specify resources.cpu and resources.memory
                - rule: "(has(self.resources) && has(self.resources.gpu)) || (!has(self.runtime.tensorParallelSize) && !has(self.runtime.gpuMemoryUtilization))"
                  message: tensorParallelSize and gpuMemoryUtilization require resources.gpu
                - rule: "!has(self.runtime.tensorParallelSize) || (has(self.resources) && has(self.resources.gpu) && self.runtime.tensorParallelSize <= self.resources.gpu.count)"
                  message: tensorParallelSize must not exceed resources.gpu.count
              properties:
                model:
                  type: object
                  required:
                    - repo
                  properties:
                    name:
                      type: string
                    source:
                      type: string
                      default: huggingface
                    repo:
                      type: string
                      minLength: 1
                    revision:
                      type: string
                      default: main
                runtime:
                  type: object
                  required:
                    - ref
                  properties:
                    ref:
                      type: string
                      minLength: 1
                    image:
                      type: string
                    dtype:
                      type: string
                    maxModelLen:
                      type: integer
                      format: int32
                      minimum: 1
                    tensorParallelSize:
                      type: integer
                      format: int32
                      minimum: 1
                    gpuMemoryUtilization:
                      type: number
                      minimum: 0
                      maximum: 1
                resources:
                  type: object
                  default: {}
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    gpu:
                      type: object
                      required:
                        - count
                      properties:
                        count:
                          type: integer
                          format: int32
                          minimum: 1
                        vendor:
                          type: string
                          default: nvidia
                        type:
                          type: string
                activation:
                  type: object
                  default: {}
                  properties:
                    desiredState:
                      type: string
                      enum: [Inactive, Active]
                      default: Inactive
                    whenFull:
                      type: string
                      enum: [Queue, Reject, ReplaceOldest, ReplaceLowestPriority]
                      default: Queue
                    priority:
                      type: integer
                      format: int32
                    drainTimeout:
                      type: string
                      default: 5m
                scaling:
                  type: object
                  default: {}
                  properties:
                    minReplicas:
                      type: integer
                      format: int32
                      minimum: 0
                      default: 0
                    maxReplicas:
                      type: integer
                      format: int32
                      minimum: 0
                      default: 1
                    targetPendingRequests:
                      type: integer
                      format: int32
                      minimum: 1
                    idleTimeout:
                      type: string
                  x-kubernetes-validations:
                    - rule: "self.maxReplicas >= self.minReplicas"
                      message: maxReplicas must be greater than or equal to minReplicas
                routing:
                  type: object
                  default: {}
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    path:
                      type: string
                      pattern: ^/
                    openAICompatible:
                      type: boolean
                      default: true
                    policy:
                      type: object
                      properties:
                        routingStrategy:
                          type: string
                          enum: [LeastLoaded, Weighted]
                        weight:
                          type: integer
                          format: int32
                          minimum: 0
                          maximum: 1000000
                        rateLimit:
                          type: object
                          properties:
                            requestsPerMinute:
                              type: integer
                              format: int32
                              minimum: 1
                            burst:
                              type: integer
                              format: int32
                              minimum: 0
                        requestLogging:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                cache:
                  type: object
                  default: {}
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    type:
                      type: string
                      enum: [nodeLocal]
                      default: nodeLocal
                    size:
                      type: string
                    path:
                      type: string
                secrets:
                  type: object
                  properties:
                    huggingFaceTokenSecretName:
                      type: string
                scheduling:
                  type: object
                  properties:
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      items:
                        type: object
                        properties:
                          key:
                            type: string
                          operator:
                            type: string
                            enum: [Equal, Exists]
                          value:
                            type: string
                          effect:
                            type: string
                            enum: [NoSchedule, PreferNoSchedule, NoExecute]
                          tolerationSeconds:
                            type: integer
                            format: int64
                            minimum: 0
                    topologySpreadConstraints:
                      type: array
                      items:
                        type: object
                        required:
                          - maxSkew
                          - topologyKey
                          - whenUnsatisfiable
                        properties:
                          maxSkew:
                            type: integer
                            format: int32
                            minimum: 1
                          topologyKey:
                            type: string
                            minLength: 1
                          whenUnsatisfiable:
                            type: string
                            enum: [DoNotSchedule, ScheduleAnyway]
                availability:
                  type: object
                  properties:
                    podDisruptionBudget:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: true
                        minAvailable:
                          type: integer
                          format: int32
                          minimum: 0
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                  enum: [Pending, Downloading, Cached, WaitingForCapacity, WaitingForGPU, Activating, Active, Draining, Deactivating, Failed]
                endpoint:
                  type: string
                serviceName:
                  type: string
                assignedNode:
                  type: string
                assignedGPUs:
                  type: array
                  items:
                    type: string
                drainStartedAt:
                  type: string
                  format: date-time
                replacement:
                  type: object
                  properties:
                    phase:
                      type: string
                      enum: [Draining, Activating, Succeeded, Displaced, RollingBack, RolledBack, RollbackFailed]
                    requestGeneration:
                      type: integer
                      format: int64
                    target:
                      type: object
                      required: [namespace, name, uid]
                      properties:
                        namespace:
                          type: string
                        name:
                          type: string
                        uid:
                          type: string
                    requestedBy:
                      type: object
                      required: [namespace, name, uid]
                      properties:
                        namespace:
                          type: string
                        name:
                          type: string
                        uid:
                          type: string
                    startedAt:
                      type: string
                      format: date-time
                    message:
                      type: string
                cache:
                  type: object
                  properties:
                    state:
                      type: string
                    nodeName:
                      type: string
                    path:
                      type: string
                replicas:
                  type: object
                  properties:
                    desired:
                      type: integer
                      format: int32
                    ready:
                      type: integer
                      format: int32
                scaling:
                  type: object
                  properties:
                    desiredReplicas:
                      type: integer
                      format: int32
                    pendingRequests:
                      type: integer
                      format: int64
                    runningRequests:
                      type: integer
                      format: int64
                    lastActivityTime:
                      type: string
                      format: date-time
                    capacityLimited:
                      type: boolean
                    reason:
                      type: string
                    message:
                      type: string
                model:
                  type: object
                  properties:
                    loaded:
                      type: boolean
                    repo:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", Unknown]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
