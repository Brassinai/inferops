apiVersion: inference.inferops.dev/v1alpha1
kind: ModelDeployment
metadata:
  name: qwen-inactive
spec:
  model:
    name: qwen-inactive
    source: huggingface
    repo: Qwen/Qwen2.5-7B-Instruct
    revision: main
  runtime:
    ref: nano-vllm
    maxModelLen: 4096
    tensorParallelSize: 1
    gpuMemoryUtilization: 0.85
  resources:
    cpu: "8"
    memory: 32Gi
    gpu:
      count: 1
      vendor: nvidia
  activation:
    desiredState: Inactive
    whenFull: Queue
    priority: 50
    drainTimeout: 5m
  scaling:
    minReplicas: 0
    maxReplicas: 1
  routing:
    enabled: true
    path: /models/qwen-inactive
    openAICompatible: true
  cache:
    enabled: true
    type: nodeLocal
    size: 100Gi
    path: /var/lib/inferops/models
status:
  observedGeneration: 1
  phase: Cached
  endpoint: /models/qwen-inactive/v1
  serviceName: qwen-inactive-runtime
  cache:
    state: Ready
    nodeName: gpu-node-1
    path: /var/lib/inferops/models/qwen-inactive
  replicas:
    desired: 0
    ready: 0
  model:
    loaded: false
    repo: Qwen/Qwen2.5-7B-Instruct
  conditions:
    - type: Ready
      status: "False"
      observedGeneration: 1
      lastTransitionTime: "2026-06-11T09:00:00Z"
      reason: Inactive
      message: Model is cached and inactive.
    - type: CacheReady
      status: "True"
      observedGeneration: 1
      lastTransitionTime: "2026-06-11T09:00:00Z"
      reason: CacheVerified
      message: Model cache is ready.
