    path: /var/lib/inferops/models/qwen-waiting
  replicas:
    desired: 1
    ready: 0
  model:
    loaded: false
    repo: Qwen/Qwen2.5-7B-Instruct
  conditions:
    - type: Ready
      status: "False"
      observedGeneration: 1
      lastTransitionTime: "2026-06-11T09:05:00Z"
      reason: WaitingForGPU
      message: Waiting for one compatible GPU.
