apiVersion: inference.inferops.dev/v1alpha1
kind: ModelDeployment
metadata:
  name: cpu-smollm
spec:
  model:
    name: cpu-smollm
    source: huggingface
    repo: jc-builds/SmolLM2-135M-Instruct-Q4_K_M-GGUF
    revision: main
  runtime:
    ref: llama-cpp
    maxModelLen: 512
  resources:
    cpu: "4"
    memory: 2Gi
  activation:
    desiredState: Inactive
    whenFull: Queue
    priority: 50
    drainTimeout: 5m
  scaling:
    minReplicas: 0
    maxReplicas: 1
  routing:
    enabled: true
    path: /models/cpu-smollm
    openAICompatible: true
  cache:
    enabled: true
    type: nodeLocal
    size: 1Gi
    path: /var/lib/inferops/models
