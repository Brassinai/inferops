<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InferOps Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>InferOps</h1>
        <p id="subtitle">Loading cluster state...</p>
      </div>
      <div class="topbar-actions">
        <span id="health" class="status-dot">Loading</span>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="Summary">
        <article>
          <span id="deployment-count">0</span>
          <small>Deployments</small>
        </article>
        <article>
          <span id="active-count">0</span>
          <small>Active</small>
        </article>
        <article>
          <span id="cache-count">0</span>
          <small>Caches</small>
        </article>
      </section>

      <section>
        <div class="section-title">
          <h2>Deployments</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phase</th>
                <th>Runtime</th>
                <th>Replicas</th>
                <th>Cache / GPU</th>
                <th>Endpoint</th>
              </tr>
            </thead>
            <tbody id="deployments"></tbody>
          </table>
        </div>
      </section>

      <section class="grid">
        <div>
          <div class="section-title"><h2>Workload Detail</h2></div>
          <div id="deployment-cards" class="cards"></div>
        </div>
        <div>
          <div class="section-title"><h2>Caches</h2></div>
          <div id="caches" class="cards"></div>
        </div>
      </section>

      <section class="grid">
        <div>
          <div class="section-title"><h2>GPU Capacity</h2></div>
          <div id="gpus" class="cards"></div>
        </div>
        <div>
          <div class="section-title"><h2>Recent Events</h2></div>
          <div id="events" class="cards"></div>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
